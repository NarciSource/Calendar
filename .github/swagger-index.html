<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Swagger UI</title>
    <link href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@4.14.0/swagger-ui.css" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@4.14.0/swagger-ui-bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@4.14.0/swagger-ui-standalone-preset.js"></script>
</head>
<body>
<div id="swagger-ui"></div>
<script>
    SwaggerUIBundle({
        url: "openapi.yaml", // Swagger UI가 로드할 OpenAPI YAML 파일
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIStandalonePreset
        ],
    });
</script>
</body>
</html>
